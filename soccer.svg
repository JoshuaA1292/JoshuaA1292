<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 80" width="800" height="80">
  <defs>
    <linearGradient id="field" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14532d"/>
      <stop offset="100%" stop-color="#0f3d20"/>
    </linearGradient>
  </defs>

  <!-- Pitch background -->
  <rect width="800" height="80" fill="url(#field)"/>
  <rect x="0"   y="0" width="100" height="80" fill="#166534" opacity="0.4"/>
  <rect x="200" y="0" width="100" height="80" fill="#166534" opacity="0.4"/>
  <rect x="400" y="0" width="100" height="80" fill="#166534" opacity="0.4"/>
  <rect x="600" y="0" width="100" height="80" fill="#166534" opacity="0.4"/>
  <rect x="398" y="0" width="2" height="80" fill="white" opacity="0.3"/>
  <circle cx="400" cy="40" r="22" fill="none" stroke="white" stroke-width="1.5" opacity="0.3"/>
  <rect x="0" y="72" width="800" height="2" fill="white" opacity="0.35"/>

  <!--
    Outer group: translates the ball from x=-40 to x=840, fixed at y=40.
    Inner group: rotates the ball in place around (0,0).
    Ball shapes are all centered at (0,0).
  -->
  <g>
    <animateTransform
      attributeName="transform"
      type="translate"
      from="-40 40"
      to="840 40"
      dur="5s"
      repeatCount="indefinite"/>

    <g>
      <animateTransform
        attributeName="transform"
        type="rotate"
        from="0"
        to="1080"
        dur="5s"
        repeatCount="indefinite"/>

      <circle r="20" fill="white" stroke="#d1d5db" stroke-width="0.5"/>
      <polygon points="0,-20  7,-13  4,-2 -4,-2 -7,-13"          fill="#111"/>
      <polygon points="7,-13 18,-8  16,4   7,8   4,-2"            fill="#111" opacity="0.85"/>
      <polygon points="7,8   16,4  12,16   2,20  -3,12"           fill="#111" opacity="0.85"/>
      <polygon points="-3,12  2,20  -8,20 -15,12 -11,3"           fill="#111" opacity="0.85"/>
      <polygon points="-11,3 -15,12 -18,2 -17,-10 -7,-13"         fill="#111" opacity="0.85"/>
    </g>
  </g>
</svg>
